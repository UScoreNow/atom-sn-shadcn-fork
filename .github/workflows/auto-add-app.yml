name: Auto Add App to Documentation

on:
  issues:
    types: [opened, reopened]

# Deny all permissions by default; grant the minimum per job below.
permissions: {}

# Serialize (and supersede) runs for the same issue to avoid racing on the branch.
concurrency:
  group: auto-add-app-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  auto-add-app:
    if: contains(github.event.issue.body, 'Site URL') && contains(github.event.issue.body, 'Site Name')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Run automation script
        id: add-app
        run: node .github/scripts/add-app-to-docs.js
        env:
          # gh CLI reads GH_TOKEN/GITHUB_TOKEN; git push uses the checkout token.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Comment on issue
        if: steps.add-app.outputs.pr_url
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PR_URL: ${{ steps.add-app.outputs.pr_url }}
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 Thank you for submitting your app! A pull request has been automatically created: ${process.env.PR_URL}\n\nOnce the PR is merged, your app will appear in the documentation sidebar.`
            });

      - name: Close issue
        if: steps.add-app.outputs.pr_url
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
